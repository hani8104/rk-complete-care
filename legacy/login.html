<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RK The Complete Care</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="hero-bg-blob blob-1" style="width: 800px; height: 800px; opacity: 0.4;"></div>
    <div class="hero-bg-blob blob-2" style="width: 600px; height: 600px; opacity: 0.4;"></div>

    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 40px; text-align: center;">
        <h2 class="text-blue" style="margin-bottom: 5px;">Welcome Back</h2>
        <p style="color: #666; margin-bottom: 30px;">Login to access your dashboard</p>

        <form action="admin.html">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--primary-blue);">Email /
                    Username</label>
                <input type="text" class="form-control" placeholder="admin@rkcare.com"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(15, 46, 90, 0.1); background: rgba(255,255,255,0.5);">
            </div>

            <div style="margin-bottom: 20px; text-align: left;">
                <label
                    style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--primary-blue);">Password</label>
                <input type="password" class="form-control" placeholder="••••••••"
                    style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(15, 46, 90, 0.1); background: rgba(255,255,255,0.5);">
            </div>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 0.9rem;">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="text-gold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem;">Don't have an account? <a href="#" class="text-blue"
                style="font-weight: 600;">Sign up</a></p>
    </div>

</body>

</html>
